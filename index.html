<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LOE COL v0.02.1</title>

<style>
html, body {
  margin: 0;
  background: black;
  overflow: hidden;
  color: white;
  font-family: sans-serif;
}

#game {
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

canvas {
  aspect-ratio: 3/2;
  width: 100%;
  max-height: 100%;
}

.ui {
  position: fixed;
  top: 10px;
  left: 10px;
}

.topright {
  position: fixed;
  top: 10px;
  right: 10px;
}

.center {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}
button {
  padding: 10px 20px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div id="game">
  <canvas id="canvas" width="960" height="640"></canvas>
</div>

<div class="ui" id="hud"></div>
<div class="topright">v0.02.1</div>
<div class="center" id="menu"></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let state = "menu";
let autoAim = false;

let phase = 1;
let transitioning = false;
let transitionTimer = 0;

let player = {
  x: 100,
  y: 320,
  speed: 3,
  angle: 0,
  cooldown: 0,
  hp: 100
};

let bullets = [];
let enemies = [];

let keys = {};
let mouseDown = false;

let leftTouch = null;
let rightTouch = null;

// INPUT
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

canvas.addEventListener("mousedown", () => mouseDown = true);
window.addEventListener("mouseup", () => mouseDown = false);

canvas.addEventListener("mousemove", e => {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width * canvas.width;
  const y = (e.clientY - rect.top) / rect.height * canvas.height;
  player.angle = Math.atan2(y - player.y, x - player.x);
});

// TOUCH
canvas.addEventListener("touchstart", e => {
  const rect = canvas.getBoundingClientRect();
  for (let t of e.changedTouches) {
    const x = (t.clientX - rect.left) / rect.width * canvas.width;

    if (x < canvas.width / 2 && !leftTouch) {
      leftTouch = { id: t.identifier, startX: x };
    } else if (!rightTouch) {
      rightTouch = { id: t.identifier };
    }
  }
}, { passive: false });

canvas.addEventListener("touchmove", e => {
  const rect = canvas.getBoundingClientRect();
  for (let t of e.changedTouches) {
    const x = (t.clientX - rect.left) / rect.width * canvas.width;
    const y = (t.clientY - rect.top) / rect.height * canvas.height;

    if (leftTouch && t.identifier === leftTouch.id) {
      let dx = x - leftTouch.startX;
      player.x += Math.sign(dx) * player.speed;
    }

    if (rightTouch && t.identifier === rightTouch.id) {
      player.angle = Math.atan2(y - player.y, x - player.x);
      shoot();
    }
  }
}, { passive: false });

canvas.addEventListener("touchend", e => {
  for (let t of e.changedTouches) {
    if (leftTouch && t.identifier === leftTouch.id) leftTouch = null;
    if (rightTouch && t.identifier === rightTouch.id) rightTouch = null;
  }
});

// SHOOT
function shoot() {
  if (player.cooldown > 0) return;

  let targetAngle = player.angle;

  if (autoAim && enemies.length > 0) {
    let closest = enemies.reduce((a,b) =>
      dist(player, a) < dist(player, b) ? a : b
    );
    targetAngle = Math.atan2(closest.y - player.y, closest.x - player.x);
  }

  bullets.push({
    x: player.x,
    y: player.y,
    vx: Math.cos(targetAngle) * 8,
    vy: Math.sin(targetAngle) * 8
  });

  player.cooldown = 10;
}

// SPAWN
function spawnPhase() {
  enemies = [];
  for (let i = 0; i < phase + 2; i++) {
    enemies.push({
      x: 300 + Math.random() * 500,
      y: 100 + Math.random() * 400,
      hp: 3
    });
  }
}

// UTILS
function dist(a,b){
  return Math.hypot(a.x-b.x,a.y-b.y);
}

// UPDATE
function update() {
  if (state !== "game") return;

  if (transitioning) {
    transitionTimer--;
    if (transitionTimer <= 0) {
      transitioning = false;
      phase++;
      player.x = 100;
      spawnPhase();
    }
    return;
  }

  if (keys["a"]) player.x -= player.speed;
  if (keys["d"]) player.x += player.speed;
  if (keys["w"]) player.y -= player.speed;
  if (keys["s"]) player.y += player.speed;

  if (mouseDown) shoot();
  if (player.cooldown > 0) player.cooldown--;

  bullets = bullets.map(b => ({
    ...b,
    x: b.x + b.vx,
    y: b.y + b.vy
  }));

  enemies.forEach(e => {
    let dx = player.x - e.x;
    let dy = player.y - e.y;
    let d = Math.hypot(dx, dy) || 1;

    e.x += (dx / d) * 1.2;
    e.y += (dy / d) * 1.2;

    if (d < 20) player.hp -= 0.2;
  });

  bullets.forEach(b => {
    enemies.forEach(e => {
      if (dist(b,e) < 15) {
        e.hp--;
        b.hit = true;
      }
    });
  });

  bullets = bullets.filter(b => !b.hit);
  enemies = enemies.filter(e => e.hp > 0);

  // DOOR CHECK
  if (enemies.length === 0 && player.x > 880) {
    transitioning = true;
    transitionTimer = 60;
  }
}

// DRAW
function draw() {
  ctx.fillStyle = "#05070d";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (state === "menu") return;

  // DOOR
  ctx.fillStyle = "yellow";
  ctx.fillRect(900, 260, 40, 120);

  // ARROW
  ctx.fillStyle = "white";
  ctx.fillText("→", 880, 320);

  // PLAYER
  ctx.fillStyle = "#22c55e";
  ctx.beginPath();
  ctx.arc(player.x, player.y, 15, 0, Math.PI * 2);
  ctx.fill();

  // BULLETS
  ctx.fillStyle = "#3b82f6";
  bullets.forEach(b => {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
    ctx.fill();
  });

  // ENEMIES
  ctx.fillStyle = "#ef4444";
  enemies.forEach(e => {
    ctx.beginPath();
    ctx.arc(e.x, e.y, 12, 0, Math.PI * 2);
    ctx.fill();
  });

  // HUD
  document.getElementById("hud").innerHTML =
    "HP: " + Math.floor(player.hp) + "<br>Phase: " + phase;

  // TRANSITION TEXT
  if (transitioning) {
    ctx.fillStyle = "white";
    ctx.font = "30px sans-serif";
    ctx.fillText("Entering next phase...", 300, 300);
  }
}

// MENU
function showMenu() {
  document.getElementById("menu").innerHTML = `
    <h1>Champions of Light</h1>
    <button onclick="startGame()">Start</button><br>
    <button onclick="toggleAutoAim()">Auto Aim: ${autoAim ? "ON" : "OFF"}</button>
  `;
}

function startGame() {
  state = "game";
  document.getElementById("menu").innerHTML = "";
  phase = 1;
  player.hp = 100;
  player.x = 100;
  spawnPhase();
}

function toggleAutoAim() {
  autoAim = !autoAim;
  showMenu();
}

showMenu();

// LOOP
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
